# Synthetic standalone image (NOT a real config) — no arch axis ⇒ amd64 default, but the OCI base
# pins linux/arm64, so the cell arch and base-image arch conflict (arch-and-platform.md §3).
name: solo

base:
  oci:
    uri: registry.example/base:edge
    platform: linux/arm64

outputs:
  - format: cosi

config:
  os:
    hostname: solo
