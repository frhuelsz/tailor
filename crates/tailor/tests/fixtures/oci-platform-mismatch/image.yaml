# Synthetic standalone image (NOT a real config) — the image is pinned amd64 (arch axis), but the OCI
# base pins linux/arm64, so the cell arch and base-image arch conflict (2026-06-29-arch-and-platform.md §3).
name: solo

matrix:
  arch: [amd64]

base:
  oci:
    uri: registry.example/base:edge
    platform: linux/arm64

outputs:
  - format: cosi

config:
  os:
    hostname: solo
