# Synthetic test workspace (NOT a real config) — exercises the base-image catalogue: a `baseImages:`
# list of named slots and a member image that references one with `base: { ref: <name> }`.
schemaVersion: 1

toolchains:
  default: ic
  entries:
    - name: ic
      container: registry.example/imagecustomizer
      version: "1.0.0"

defaults:
  outputs:
    - format: cosi

baseImages:
  - name: baremetal
    path: bases/baremetal.vhdx
    arch: amd64
    source:
      azureLinux:
        version: "3.0"
        variant: baremetal
  - name: edge
    path: bases/edge.vhdx
    arch: amd64
    source:
      oci:
        uri: registry.example/edge:latest
