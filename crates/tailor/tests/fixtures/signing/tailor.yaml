schemaVersion: 1

toolchains:
  default: ic
  entries:
    - name: ic
      container: registry.example/imagecustomizer
      tag: "1.0.0"

# Signing profiles (meta/docs/2026-06-29-signing.md §4). Purpose-built test fixtures, not real keys.
signing:
  default: test-ca
  profiles:
    test-ca:
      backend: local-test-ca
      publishCaCert: ./artifacts/ca_cert.pem
    byo:
      backend: keypair
      key: ./keys/db.key
      cert: ./keys/db.crt
    broken:
      backend: keypair
      key: ./keys/absent.key
      cert: ./keys/absent.crt
