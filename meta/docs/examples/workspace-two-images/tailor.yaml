# tailor.yaml — the WORKSPACE ROOT (Cargo-style). Running `tailor build` from anywhere beneath this
# directory walks UP to find this file; everything under it is one workspace.
#
# This file holds the REPO-WIDE settings — the Image Customizer toolchain(s), the container-runtime
# knobs, and defaults applied to every image. The images themselves live in member subdirectories
# (one `image.yaml` each) and are AUTO-DISCOVERED, so there is nothing to list here.
schemaVersion: 1

# ── IC version(s): repo-wide, the single source of truth (each resolves to a digest in tailor.lock) ─
toolchains:
  default: ic-1.3                    # the toolchain an image uses unless it sets its own `toolchain:`
  entries:
    ic-1.3:
      container: mcr.microsoft.com/azurelinux/imagecustomizer
      version: "1.3.0"               # semver — drives IC feature/output gating
    ic-1.1:
      container: mcr.microsoft.com/azurelinux/imagecustomizer
      version: "1.1.0"               # kept so `database` can pin an older IC (see database/image.yaml)

# ── container-runtime knobs (bollard) — sensible defaults, rarely touched ───────────────────────────
runtime:
  imageCacheDir: ./.tailor/cache     # required because both images use an `azureLinux` (MCR) base

# ── defaults applied to EVERY image unless it overrides them ────────────────────────────────────────
defaults:
  architectures: [amd64]
  outputs:
    - format: cosi

# ── images: OMITTED ⇒ tailor auto-discovers every `*/image.yaml` at depth 1 (here: webserver/, ──────
#    database/). Provide it only to curate the set, point at a non-standard layout, or inline a
#    trivial image:
# images:
#   members: [./webserver/, ./database/]
#   exclude: [./scratch/]
