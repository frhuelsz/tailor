# database/image.yaml — a member image that OVERRIDES the toolchain and the architecture set.
#
# `toolchain:` is a TAILOR field (top level, never under `config:`). Here it picks a *different* IC
# version that the workspace already defines (`ic-1.1` instead of the default `ic-1.3`) — e.g. because
# this image isn't ready for the newer Image Customizer yet. It also widens `architectures:` to build
# BOTH amd64 and arm64 (overriding the amd64-only workspace default); `outputs:` still comes from the
# workspace `defaults:`. The toolchain (IC version) is unrelated to the base OS version below.
name: database
toolchain: ic-1.1                    # ← per-image override of the repo-wide default
architectures: [amd64, arm64]        # ← widen the amd64-only default → build BOTH arches

base:
  # `azureLinux` (MCR) images are multi-arch manifests, so ONE base covers both arches: tailor
  # resolves the per-arch digest at pull time (platform linux/<arch>). No `baseByArch` needed.
  azureLinux:
    version: "3.0"
    variant: minimal-os

config:
  os:
    hostname: database
    packages:
      install: [postgresql-server, openssh-server]
    services:
      enable: [postgresql, sshd]
  storage:
    bootType: efi
    disks:
      - partitionTableType: gpt
        maxSize: 16G
        partitions:
          - id: esp
            type: esp
            size: 8M
          - id: data
            size: grow
    filesystems:
      - deviceId: esp
        type: fat32
        mountPoint:
          path: /boot/efi
          options: "umask=0077"
      - deviceId: data
        type: ext4
        mountPoint:
          path: /
