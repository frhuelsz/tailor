os:
  bootloader:
    resetType: hard-reset
  selinux:
    mode: disabled
  kernelCommandLine:
    extraCommandLine:
    - console=tty0
    - console=tty1
    - console=ttyS0
    - rd.debug
    - loglevel=6
    - log_buf_len=1M
    - systemd.journald.forward_to_console=1
  packages:
    install:
    - efibootmgr
    - iproute
    - jq
    - openssh-server
    - trident-service
    - netplan
    - dnf5
    - iptables-nft
    - vim-enhanced
    - grub2-efi-aa64
  additionalFiles:
  - source: files/99-dhcp-eth0.network
    destination: /etc/systemd/network/99-dhcp-eth0.network
  - source: files/sudoers-wheel
    destination: /etc/sudoers.d/wheel
  - source: files/sshd-keygen.service
    destination: /usr/lib/systemd/system/sshd-keygen.service
  users:
  - name: testuser
    sshPublicKeyPaths:
    - files/id_rsa.pub
    secondaryGroups:
    - wheel
  services:
    enable:
    - tridentd.socket
  hostname: trident-vm-testimg
storage:
  bootType: efi
  disks:
  - partitionTableType: gpt
    maxSize: 10G
    partitions:
    - id: esp
      type: esp
      size: 16M
    - id: root-a
      size: 4G
    - id: root-b
      size: 4G
    - id: trident
      size: 1G
    - id: srv
      size: grow
  filesystems:
  - deviceId: esp
    type: fat32
    mountPoint:
      path: /boot/efi
      options: umask=0077
  - deviceId: root-a
    type: ext4
    mountPoint: /
  - deviceId: trident
    type: ext4
    mountPoint: /var/lib/trident
  - deviceId: srv
    type: ext4
    mountPoint: /srv
scripts:
  postCustomization:
  - path: scripts/post-install.sh
  - path: scripts/update-host-status.sh
  - path: scripts/prepare-update-config.sh
  - path: scripts/ssh-move-host-keys.sh
  - path: scripts/create-ssh-dirs.sh
  - path: scripts/duid-type-to-link-layer.sh
