# by-variant/usr-verity.yaml → reproduces base/baseimg-usr-verity.yaml
# (identical to root-verity EXCEPT: no overlays, usr storage layout, different hostname)
config:
  os:
    hostname: trident-vm-usr-verity-testimg
    uki:
      mode: create
    kernelCommandLine:
      extraCommandLine:
        - rd.hostonly=0
    packages:
      install:
        - device-mapper
        - kexec-tools
        - lvm2
        - "${sdBootPkg}"            # 3.0: systemd-boot · 4.0: systemd-boot-unsigned (Fedora)
        - systemd-udev
        - veritysetup
      remove:
        - "${grubEfiPkg}"           # remove whichever grub EFI pkg the release/arch shipped
    services:
      enable:
        - kdump
        - trident
  storage:
    $include: layouts/storage/usr-verity.yaml
  scripts:
    postCustomization:
      - path: scripts/post-install.sh
      - path: scripts/update-host-status.sh
      - path: scripts/prepare-update-config-verity.sh
        arguments: [uki]
      - path: scripts/duid-type-to-link-layer.sh
  previewFeatures:
    - uki
