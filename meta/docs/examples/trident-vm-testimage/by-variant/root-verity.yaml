# by-variant/root-verity.yaml → reproduces base/baseimg-root-verity.yaml
config:
  os:
    hostname: trident-vm-root-verity-testimg
    uki:
      mode: create
    kernelCommandLine:
      extraCommandLine:
        - rd.hostonly=0              # appended after the 7 shared entries in image.yaml's config
    packages:
      install:
        - device-mapper
        - kexec-tools
        - lvm2
        - "${sdBootPkg}"            # 3.0: systemd-boot · 4.0: systemd-boot-unsigned (Fedora)
        - systemd-udev
        - veritysetup
      remove:
        - "${grubEfiPkg}"           # remove whichever grub EFI pkg the release/arch shipped
    overlays:
      - mountPoint: /etc
        lowerDirs: [/etc]
        upperDir: /var/lib/overlays/etc/upper
        workDir: /var/lib/overlays/etc/work
        mountDependencies: [/var]
        isInitrdOverlay: true
    services:
      enable:
        - kdump
        - trident                   # appended to the shared [tridentd.socket]
  storage:
    $include: layouts/storage/root-verity.yaml
  scripts:
    postCustomization:
      - path: scripts/post-install.sh
      - path: scripts/update-host-status.sh
      - path: scripts/prepare-update-config-verity.sh
        arguments: [uki]
      - path: scripts/duid-type-to-link-layer.sh
  previewFeatures:
    - uki
