# by-release/4.0.yaml — HYPOTHETICAL Azure Linux 4.0: package set realigned to Fedora naming.
#
# Verified against the live beta repo (packages.microsoft.com/azurelinux/4.0/beta): the bare
# dnf / iptables / vim / systemd-boot / grub2-efi-binary names are GONE, replaced by Fedora-style
# split/renamed packages. Adding 4.0 was: this one file + the `release` line in image.yaml's matrix —
# NO existing file was edited, and every 3.0 cell stays byte-for-byte identical.
params:
  # Fedora aligns the grub EFI package to an arch-specific name; ${efiArch} comes from by-arch/*.yaml
  # (x64 on amd64, aa64 on arm64), so one line covers both arches.
  grubEfiPkg: "grub2-efi-${efiArch}"   # → grub2-efi-x64 (amd64) / grub2-efi-aa64 (arm64)
  sdBootPkg:  systemd-boot-unsigned    # systemd-boot → systemd-boot-unsigned (Fedora)

# 4.0 is beta-only, so add its repo as an rpm-source for the new names to resolve. `rpmSources` is a
# TAILOR field → tailor passes it as `--rpm-source ./repos/azurelinux-4.0-beta.repo` (used only at
# customization time, not baked into the image). See repos/azurelinux-4.0-beta.repo.
rpmSources:
  - repos/azurelinux-4.0-beta.repo

# 4.0 ships from MCR — a different source/kind than 3.0's local vhdx. `$set` overrides the by-arch
# base (the documented way to resolve a per-cell base owned by a different axis).
base:
  $set:
    oci:
      uri: "mcr.microsoft.com/azurelinux/4.0/image/minimal-os:latest"
      platform: "linux/${arch}"

config:
  os:
    packages:
      install:
        - dnf5            # dnf  → dnf5         (Fedora default package manager)
        - iptables-nft    # iptables → iptables-nft  (nft backend; bare `iptables` no longer exists)
        - vim-enhanced    # vim  → vim-enhanced  (Fedora splits vim-minimal / vim-enhanced)
