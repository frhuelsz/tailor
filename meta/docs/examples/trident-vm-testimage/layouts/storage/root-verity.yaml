# Included at `storage:` — verbatim from base/baseimg-root-verity.yaml.
bootType: efi
disks:
  - partitionTableType: gpt
    partitions:
      - id: esp
        type: esp
        label: esp
        size: 512M
      - id: boot-a
        size: 256M
      - id: boot-b
        size: 256M
      - id: root-a
        size: 4G
      - id: root-b
        size: 4G
      - id: root-hash-a
        size: 128M
      - id: root-hash-b
        size: 128M
      - id: var-a
        size: 1G
      - id: var-b
        size: 1G
      - id: trident
        label: trident
        size: 512M
      - id: home
        label: home
        size: 1G
      - id: srv
        label: srv
        size: 128M
verity:
  - id: rootverity
    name: root
    dataDeviceId: root-a
    hashDeviceId: root-hash-a
    dataDeviceMountIdType: uuid
    hashDeviceMountIdType: uuid
filesystems:
  - deviceId: esp
    type: fat32
    mountPoint:
      idType: part-label
      path: /boot/efi
      options: umask=0077
  - deviceId: boot-a
    type: ext4
    mountPoint:
      idType: uuid
      path: /boot
  - deviceId: rootverity
    type: ext4
    mountPoint:
      path: /
      options: "defaults,ro"
  - deviceId: var-a
    type: ext4
    mountPoint:
      idType: uuid
      path: /var
      options: "defaults,x-initrd.mount"
  - deviceId: trident
    type: ext4
    mountPoint:
      idType: part-label
      path: /var/lib/trident
  - deviceId: home
    type: ext4
    mountPoint:
      idType: part-label
      path: /home
  - deviceId: srv
    type: ext4
    mountPoint:
      idType: part-label
      path: /srv
