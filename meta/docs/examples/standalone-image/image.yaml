# image.yaml — a COMPLETE, STANDALONE image. There is NO tailor.yaml anywhere above it, so this one
# file carries everything: the toolchain (IC version), the base image, and the IC config under
# `config:`. Run `tailor build` from this directory and that's it.
#
# Because there is no workspace to define toolchains, `toolchain:` is given INLINE here. Omit it
# entirely to use tailor's built-in default (the `latest` Image Customizer). Either way the resolved
# registry digest is pinned into a `tailor.lock` written next to this file, so the build stays reproducible.
name: appliance

toolchain:                           # inline definition (no tailor.yaml to reference an id from)
  name: ic-inline
  container: mcr.microsoft.com/azurelinux/imagecustomizer
  version: "1.3.0"                   # optional, informational; omit to track `latest`

outputs:
  - format: cosi                     # no `defaults:` to inherit from, so state it here (or omit → cosi)

base:
  azureLinux:
    version: "3.0"
    variant: minimal-os

config:
  os:
    hostname: appliance
    bootloader:
      resetType: hard-reset
    packages:
      install: [openssh-server, vim, chrony]
    services:
      enable: [sshd, chronyd]
  storage:
    bootType: efi
    disks:
      - partitionTableType: gpt
        maxSize: 4G
        partitions:
          - id: esp
            type: esp
            size: 8M
          - id: rootfs
            size: grow
    filesystems:
      - deviceId: esp
        type: fat32
        mountPoint:
          path: /boot/efi
          options: "umask=0077"
      - deviceId: rootfs
        type: ext4
        mountPoint:
          path: /
