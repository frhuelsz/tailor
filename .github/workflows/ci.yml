name: CI

# Runs on every push to main and on every pull request (including PRs from forks,
# which get a read-only token — CI here is read-only).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0
      # setup-rust-toolchain reads rust-toolchain.toml (channel + rustfmt/clippy
      # components) and sets up the cargo cache automatically.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
          # GitHub-hosted ARM64 Linux runner. Free for public repos; private repos
          # need a plan that includes ARM runners. Swap for a self-hosted ARM label
          # (or QEMU) if unavailable.
          - arch: arm64
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4.2.0
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test --workspace --locked

  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    # Each architecture is built natively on its own runner, so musl-tools provides
    # the correctly-targeted musl-gcc and ring's C/asm compiles without a cross setup.
    env:
      CC_x86_64_unknown_linux_musl: musl-gcc
      CC_aarch64_unknown_linux_musl: musl-gcc
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4.2.0
      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - name: Build static binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p tailor
      - name: Stage artifact
        run: |
          mkdir -p dist
          install -Dm755 "target/${{ matrix.target }}/release/tailor" "dist/tailor-${{ matrix.target }}"
          ( cd dist && sha256sum "tailor-${{ matrix.target }}" > "tailor-${{ matrix.target }}.sha256" )
      - name: Verify the binary is fully static
        run: |
          BIN="dist/tailor-${{ matrix.target }}"
          file "$BIN"
          file "$BIN" | grep -qE 'static-pie linked|statically linked'
      - uses: actions/upload-artifact@v4
        with:
          name: tailor-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
